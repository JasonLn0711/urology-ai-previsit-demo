<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>泌尿預診導航 V2 - 自適應問答示範</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="./adaptive-intake.css">
  </head>
  <body class="adaptive-demo-page">
    <header class="topbar patient-topbar" aria-label="泌尿預診導航 V2">
      <a class="brand" href="./index.html" aria-label="泌尿預診導航 V2 首頁">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <strong data-i18n="brandTitle">泌尿預診導航 V2</strong>
          <small data-i18n="brandSubtitle">12 題內門診前問診</small>
        </span>
      </a>
      <nav class="nav-actions" aria-label="示範操作">
        <span class="version-pill" id="versionBadge">v2.2.0</span>
        <button class="ghost-button" id="loadNocturia" type="button" data-i18n="sampleNocturia">夜尿案例</button>
        <button class="ghost-button" id="loadPain" type="button" data-i18n="samplePain">尿痛案例</button>
        <button class="ghost-button" id="loadBlood" type="button" data-i18n="sampleBlood">血尿案例</button>
        <button class="ghost-button" id="loadVaguePain" type="button" data-i18n="sampleVaguePain">疼痛不清楚</button>
        <button class="ghost-button" id="loadVagueUrinary" type="button" data-i18n="sampleVagueUrinary">尿尿怪怪</button>
        <button class="ghost-button" id="resetDemo" type="button" data-i18n="reset">重新開始</button>
        <div class="demo-mode-switch" aria-label="示範模式">
          <a aria-current="page" href="./">V2 自適應問答</a>
          <a href="../patient-short/" data-i18n="shortMode">短版問答</a>
        </div>
      </nav>
    </header>

    <main class="app-shell adaptive-shell question-first-shell">
      <section class="workspace adaptive-workspace" aria-label="自適應看診前問答示範">
        <section class="intake-panel adaptive-question-panel" aria-labelledby="question-title">
          <div class="panel-head">
            <div>
              <p class="eyebrow" data-i18n="nextEyebrow">下一題</p>
              <h1 id="question-title">等待</h1>
            </div>
            <div class="readiness" aria-live="polite">
              <span id="turnLabel">第 0 輪</span>
              <strong id="scoreLabel">尚未排序</strong>
            </div>
          </div>

          <div id="questionMount" class="adaptive-question-mount"></div>
        </section>

        <aside class="case-rail adaptive-input-panel" aria-labelledby="input-title">
          <div class="rail-section">
            <p class="eyebrow" data-i18n="inputEyebrow">輸入</p>
            <h2 id="input-title" data-i18n="inputTitle">病人說法</h2>
            <p class="panel-copy" data-i18n="inputCopy">可貼上病人說的話；ASR 只是可選輸入。</p>
            <label class="adaptive-label" for="transcriptInput" data-i18n="transcriptLabel">目前說法</label>
            <textarea id="transcriptInput" class="adaptive-transcript" rows="8" placeholder="例如：我最近晚上一直起來尿，有時候突然很急。"></textarea>
            <div class="adaptive-actions">
              <button class="secondary-button" id="asrButton" type="button" data-i18n="startAsr">開始 ASR</button>
              <button class="primary-button" id="computeButton" type="button" data-i18n="computeNext">找下一題</button>
            </div>
            <p class="asr-status" id="asrStatus" role="status" data-i18n="asrIdle">ASR 未啟動；可用文字輸入。</p>
          </div>

          <div class="rail-section">
            <p class="eyebrow" data-i18n="answeredEyebrow">已回答</p>
            <div id="answeredFacts" class="fact-list"></div>
          </div>
        </aside>

        <aside class="summary-panel adaptive-rationale-panel" aria-labelledby="rationale-title">
          <div class="rail-section">
            <p class="eyebrow" data-i18n="rankingEyebrow">排序</p>
            <h2 id="rationale-title" data-i18n="rankingTitle">為什麼選這題？</h2>
            <p class="panel-copy" data-i18n="rankingCopy">系統依照語意符合、缺口、流程價值、模糊度與安全邊界排序。</p>
          </div>
          <div class="rail-section">
            <p class="eyebrow" data-i18n="stateEyebrow">狀態</p>
            <div id="stateSummary" class="state-summary"></div>
          </div>
          <div class="rail-section">
            <p class="eyebrow">模糊說法閘門</p>
            <div id="ambiguityMount" class="ambiguity-status"></div>
          </div>
          <div class="rail-section">
            <p class="eyebrow">前三個候選題</p>
            <div id="rankingMount" class="ranking-list"></div>
          </div>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast" role="status" hidden></div>

    <script src="../../core/version/index.js"></script>
    <script src="../../core/adaptive_questioning/questionBank.js"></script>
    <script src="../../core/adaptive_questioning/extractFacts.js"></script>
    <script src="../../core/adaptive_questioning/detectAmbiguity.js"></script>
    <script src="../../core/adaptive_questioning/scoring.js"></script>
    <script src="../../core/adaptive_questioning/rankQuestions.js"></script>
    <script src="../../core/adaptive_questioning/index.js"></script>
    <script src="../../core/speech_answer_matching/index.js"></script>
    <script src="../shared/local-asr-client.js"></script>
    <script src="./adaptive-intake.js"></script>
  </body>
</html>
