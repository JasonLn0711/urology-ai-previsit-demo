<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>安心看診前整理 - 語音填答短版</title>
    <link rel="stylesheet" href="../shared/styles.css">
  </head>
  <body class="short-demo-page hospital-patient-page">
    <header class="topbar patient-topbar" aria-label="看診前短版整理">
      <a class="brand" href="./index.html" aria-label="安心看診前整理短版首頁">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <strong>安心看診前整理</strong>
          <small>病人填答</small>
        </span>
      </a>
      <nav class="nav-actions" aria-label="示範操作">
        <button class="ghost-button" id="resetDemo" type="button">重新開始</button>
      </nav>
    </header>

    <main class="app-shell patient-app hospital-patient-app">
      <section class="mvp-brief patient-brief" aria-labelledby="mvp-title">
        <div>
          <p class="eyebrow">門診前填答</p>
          <h1 id="mvp-title">請回答今天的泌尿狀況</h1>
          <p class="lead">
            可以直接點選答案，也可以按「用說的回答」。不知道就選「不確定」。
          </p>
        </div>
      </section>

      <section class="safety-strip patient-strip" role="note" aria-label="使用提醒">
        <span>請只回答畫面上的選項。</span>
        <span>系統會顯示聽到的答案，然後自動下一題。</span>
        <span>最後一題可以簡短補充給醫師，最多 30 秒。</span>
      </section>

      <section class="workspace patient-workspace" aria-label="短版填答區">
        <section class="intake-panel patient-intake" aria-labelledby="intake-title">
          <div class="panel-head">
            <div>
              <p class="eyebrow">填答進度</p>
              <h2 id="intake-title">9 題完成</h2>
            </div>
            <div class="readiness" aria-live="polite">
              <span id="readinessLabel">尚未完成</span>
              <strong><span id="answeredCount">0</span>/9 題</strong>
            </div>
          </div>

          <div class="progress-shell" aria-label="填答進度">
            <div class="progress-track">
              <div class="progress-bar" id="progressBar"></div>
            </div>
            <p id="progressText">第 1 題，共 9 題</p>
          </div>

          <form id="shortForm" class="question-flow">
            <div id="questionMount"></div>
            <div class="flow-actions">
              <button class="secondary-button" id="backButton" type="button">上一題</button>
              <button class="primary-button" id="nextButton" type="button">下一題</button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" hidden></div>

    <script src="../../core/safety/index.js"></script>
    <script src="../../core/attribution/index.js"></script>
    <script src="../../core/missing_fields/index.js"></script>
    <script src="../../core/summary/index.js"></script>
    <script src="../../core/role_transform/index.js"></script>
    <script src="../../core/speech_answer_matching/index.js"></script>
    <script src="../shared/local-asr-client.js"></script>
    <script src="../shared/summary.js"></script>
    <script src="../../data/synthetic_cases/index.js"></script>
    <script src="../shared/cases.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
