<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>審閱工作台</title>
    <link rel="stylesheet" href="../shared/styles.css">
  </head>
  <body>
    <header class="topbar" aria-label="審閱工作台">
      <a class="brand" href="../patient/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <strong>泌尿預診導航</strong>
          <small>審閱工作台</small>
        </span>
      </a>
      <nav class="nav-actions" aria-label="審閱頁面導覽">
        <a class="ghost-button link-button" href="../patient/">病人/家屬端</a>
        <a class="ghost-button link-button" href="../reviewer/packet/">審閱資料包</a>
        <a class="ghost-button link-button" href="../clinician/">醫師摘要</a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="mvp-brief" aria-labelledby="workbench-title">
        <div>
          <p class="eyebrow">會議決策紀錄</p>
          <h1 id="workbench-title">審閱工作台</h1>
          <p class="lead">
            將醫療團隊回饋整理成「繼續、修正或停止」紀錄；本頁不加入任何臨床決策功能。
          </p>
        </div>
        <div class="brief-visual" aria-hidden="true">
          <img src="../shared/assets/bladder-flow.svg" alt="">
        </div>
      </section>

      <section class="safety-strip" role="note" aria-label="安全邊界">
        <span>本頁只記錄審閱判斷。</span>
        <span>不做診斷、分流或治療建議。</span>
        <span>僅使用合成資料。</span>
      </section>

      <section class="workspace reviewer-workspace" aria-label="審閱決策工作區">
        <aside class="case-rail">
          <div class="rail-section">
            <p class="eyebrow">決策閘門</p>
            <h2>使用順序</h2>
            <ol class="gate-list">
              <li>用合成案例跑病人端。</li>
              <li>查看醫師摘要。</li>
              <li>在這裡記錄審閱訊號。</li>
              <li>將紀錄放入會議筆記。</li>
            </ol>
          </div>
          <div class="rail-section boundary-note">
            <p class="eyebrow">選項</p>
            <p><strong>繼續</strong>代表有用且仍在邊界內。<strong>修正</strong>代表方向可行但需要重設計。<strong>停止</strong>代表尚未展現安全且有用的流程價值。</p>
          </div>
        </aside>

        <section class="intake-panel" aria-labelledby="review-form-title">
          <div class="panel-head">
            <div>
              <p class="eyebrow">審閱輸入</p>
              <h2 id="review-form-title">決策訊號</h2>
            </div>
          </div>

          <form class="reviewer-form" id="reviewerForm">
            <fieldset>
              <legend>審閱者身分</legend>
              <label>
                審閱角色
                <select data-review-field="reviewerRole">
                  <option value="">請選擇</option>
                  <option value="Physician">醫師</option>
                  <option value="Nurse">護理人員</option>
                  <option value="Patient advocate">病人代表</option>
                  <option value="Product / workflow reviewer">產品/流程審閱者</option>
                  <option value="Governance reviewer">治理審閱者</option>
                  <option value="Other">其他</option>
                </select>
              </label>
            </fieldset>

            <fieldset>
              <legend>流程價值</legend>
              <label>
                重複詢問痛點
                <select data-review-field="workflowPain">
                  <option value="">請選擇</option>
                  <option value="clear">明確</option>
                  <option value="mixed">混合或不明確</option>
                  <option value="no">沒有明顯重複詢問痛點</option>
                </select>
              </label>
              <label>
                摘要可用性
                <select data-review-field="summaryUsefulness">
                  <option value="">請選擇</option>
                  <option value="would-read">看診時會讀</option>
                  <option value="needs-rewrite">方向有用，但格式需重寫</option>
                  <option value="no">不會讀</option>
                </select>
              </label>
              <label>
                流程位置
                <select data-review-field="workflowSlot">
                  <option value="">請選擇</option>
                  <option value="exists">有實際流程位置</option>
                  <option value="unclear">流程位置不明確</option>
                  <option value="none">沒有流程位置</option>
                </select>
              </label>
            </fieldset>

            <fieldset>
              <legend>採用現實</legend>
              <label>
                人員負擔
                <select data-review-field="staffBurden">
                  <option value="">請選擇</option>
                  <option value="acceptable">可接受</option>
                  <option value="unclear">不明確</option>
                  <option value="unacceptable">不可接受</option>
                </select>
              </label>
              <label>
                病人或協助填答
                <select data-review-field="patientFit">
                  <option value="">請選擇</option>
                  <option value="self-filled">自行填答可行</option>
                  <option value="mixed">自行與協助填答並存</option>
                  <option value="assisted-only">僅適合協助填答</option>
                  <option value="unrealistic">填答不實際</option>
                </select>
              </label>
              <label>
                既有流程
                <select data-review-field="existingProcess">
                  <option value="">請選擇</option>
                  <option value="not-sufficient">既有流程仍有缺口</option>
                  <option value="unclear">不明確</option>
                  <option value="sufficient">既有流程可能已足夠</option>
                </select>
              </label>
            </fieldset>

            <fieldset>
              <legend>會議證據</legend>
              <label>
                最有用的摘要句
                <textarea data-review-field="mostUsefulLine" placeholder="審閱者真的會讀或使用的一句話。"></textarea>
              </label>
              <label>
                最吵或風險最高的句子
                <textarea data-review-field="noisiestLine" placeholder="需要移除、重寫或降級的一句話。"></textarea>
              </label>
              <label>
                重要但缺少的資訊
                <textarea data-review-field="missingInformation" placeholder="審閱者預期看到、但目前沒有看到的資訊。"></textarea>
              </label>
              <label>
                不安全或易誤導文字
                <textarea data-review-field="unsafeWording" placeholder="需要修正的邊界文字；若沒有請寫無。"></textarea>
              </label>
              <label>
                預期流程位置
                <textarea data-review-field="expectedWorkflowSlot" placeholder="看診前、報到、護理評估、診間，或沒有。"></textarea>
              </label>
              <label>
                人員負擔疑慮
                <textarea data-review-field="staffBurdenConcern" placeholder="這會增加什麼額外工作；若沒有請寫無。"></textarea>
              </label>
              <label class="wide-field">
                案例層級證據
                <textarea data-review-field="caseEvidence" placeholder="記錄頻尿/夜尿、排尿困難、漏尿與反覆感染相關案例觀察。"></textarea>
              </label>
            </fieldset>

            <fieldset>
              <legend>邊界與下一步</legend>
              <label>
                安全邊界
                <select data-review-field="safetyBoundary">
                  <option value="">請選擇</option>
                  <option value="acceptable">可接受</option>
                  <option value="needs-wording">需要改文字</option>
                  <option value="unacceptable">不可接受</option>
                </select>
              </label>
              <label>
                審閱決策
                <select data-review-field="decision">
                  <option value="">使用系統建議</option>
                  <option value="continue">繼續</option>
                  <option value="revise">修正</option>
                  <option value="stop">停止</option>
                </select>
              </label>
              <label>
                最小下一個產物
                <select data-review-field="nextArtifact">
                  <option value="">請選擇</option>
                  <option value="Question tree revision">題目流程修正版</option>
                  <option value="One-page summary revision">單頁摘要修正版</option>
                  <option value="Workflow evidence memo">流程證據備忘錄</option>
                  <option value="Stop memo with removed assumptions">停止備忘錄與假設移除紀錄</option>
                </select>
              </label>
            </fieldset>

            <label class="wide-field">
              審閱備註
              <textarea data-review-field="reviewerNotes" placeholder="記錄有用、干擾、不安全、缺漏與下次審閱意見。"></textarea>
            </label>
          </form>
        </section>

        <aside class="summary-panel" aria-labelledby="record-title">
          <div class="panel-head">
            <div>
              <p class="eyebrow">決策紀錄</p>
              <h2 id="record-title">輸出</h2>
            </div>
          </div>
          <div id="decisionMount" class="decision-output" aria-live="polite"></div>
          <div class="summary-actions">
            <button class="secondary-button" id="copyRecord" type="button">複製紀錄</button>
            <button class="secondary-button" id="printRecord" type="button">列印</button>
          </div>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast" role="status" hidden></div>

    <script src="../../core/safety/index.js"></script>
    <script src="../../core/attribution/index.js"></script>
    <script src="../../core/missing_fields/index.js"></script>
    <script src="../../core/summary/index.js"></script>
    <script src="../../core/role_transform/index.js"></script>
    <script src="../shared/review.js"></script>
    <script src="./reviewer.js"></script>
  </body>
</html>
